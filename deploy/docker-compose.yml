version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: vdt_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - vdt_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: vdt_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - vdt_network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: vdt_jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - vdt_network

  reconciliation:
    build: ../central_service
    container_name: vdt_reconciliation
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      - ES_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - vdt_network
    volumes:
      - ../central_service/config.yaml:/app/config.yaml

networks:
  vdt_network:
    driver: bridge

volumes:
  es_data:
  jenkins_home:
