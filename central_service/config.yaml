trusted_ips:
  - "10.0.0.5"

jenkins:
  base_url: "http://jenkins:8080"
  username: "admin"
  api_token: "your-token-here"
  job_name: "deploy-myapp"
  enable_crosscheck: true
  timeout_seconds: 5

elasticsearch:
  url: "http://elasticsearch:9200"
  index: "oob-monitor-violations"

remediation:
  enabled: false
  ansible_url: "http://localhost:8081"
  ansible_token: "your-ansible-token-here"
  playbook: "rollback.yml"

server:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
